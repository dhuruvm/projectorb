<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Orb — OASIS Intelligence</title>
<style>
/* ── Reset & base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #111111;
  --surface:   #1a1a1a;
  --surface2:  #222222;
  --border:    #2a2a2a;
  --border2:   #333333;
  --text:      #ffffff;
  --text2:     #aaaaaa;
  --text3:     #666666;
  --accent:    #8b5cf6;
  --accent2:   #a78bfa;
  --accent-bg: #1e1630;
  --user-bubble: #8b5cf6;
  --user-text:   #ffffff;
  --orb-bubble:  #f0f0f0;
  --orb-text:    #111111;
  --input-bg:  #1c1c1c;
  --green:     #22c55e;
  --radius:    20px;
  --radius-sm: 12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── Layout ───────────────────────────────────── */
.app {
  display: flex;
  height: 100dvh;
  max-width: 440px;
  margin: 0 auto;
  flex-direction: column;
  background: var(--bg);
  position: relative;
}

/* ── Header ───────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.header-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  box-shadow: 0 0 0 2px var(--border2);
}

.header-info { flex: 1; }

.header-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}

.header-badge {
  font-size: 10px;
  font-weight: 600;
  background: var(--accent-bg);
  color: var(--accent2);
  border: 1px solid #3d2a6e;
  border-radius: 20px;
  padding: 2px 8px;
  letter-spacing: .03em;
}

.header-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 1px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.online-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
}

.header-actions {
  display: flex;
  gap: 6px;
}

.icon-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 14px;
  transition: background .15s, color .15s;
}

.icon-btn:hover { background: var(--surface2); color: var(--text); }

/* ── Date divider ─────────────────────────────── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 24px 4px;
  color: var(--text3);
  font-size: 11px;
  font-weight: 500;
}

.date-divider::before, .date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Messages area ────────────────────────────── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── Message rows ─────────────────────────────── */
.msg-row {
  display: flex;
  flex-direction: column;
  animation: fadeUp .25s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user  { align-items: flex-end; }
.msg-row.orb   { align-items: flex-start; }

.msg-meta {
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 4px;
  padding: 0 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.msg-row.user .msg-meta  { flex-direction: row-reverse; }

.msg-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: linear-gradient(135deg, #7c3aed, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
}

.msg-avatar.user-av {
  background: linear-gradient(135deg, #6d28d9, #8b5cf6);
}

/* ── Bubbles ──────────────────────────────────── */
.bubble {
  max-width: 82%;
  padding: 11px 15px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.55;
  position: relative;
  word-break: break-word;
}

.msg-row.user .bubble {
  background: var(--user-bubble);
  color: var(--user-text);
  border-bottom-right-radius: 5px;
  box-shadow: 0 2px 12px rgba(139,92,246,.25);
}

.msg-row.orb .bubble {
  background: var(--orb-bubble);
  color: var(--orb-text);
  border-bottom-left-radius: 5px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
}

/* Grouped bubbles: tighten radius on consecutive same-sender */
.msg-row.user  + .msg-row.user  .bubble { border-top-right-radius: 6px; }
.msg-row.orb   + .msg-row.orb   .bubble { border-top-left-radius: 6px; }

.bubble p { margin: 0; }
.bubble p + p { margin-top: 6px; }

/* ── Typing indicator ─────────────────────────── */
.typing-row { display: none; align-items: flex-start; gap: 8px; padding: 4px 0; animation: fadeUp .2s ease; }
.typing-row.show { display: flex; }

.typing-bubble {
  background: var(--orb-bubble);
  border-radius: 18px;
  border-bottom-left-radius: 5px;
  padding: 12px 16px;
  display: flex;
  gap: 4px;
  align-items: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}

.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #999;
  animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30%           { transform: translateY(-5px); }
}

/* ── Input area ───────────────────────────────── */
.input-area {
  padding: 12px 16px 20px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--input-bg);
  border: 1px solid var(--border2);
  border-radius: 26px;
  padding: 10px 10px 10px 18px;
  transition: border-color .2s;
}

.input-bar:focus-within { border-color: var(--accent); }

#msgInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  line-height: 1.5;
  max-height: 120px;
  min-height: 22px;
}

#msgInput::placeholder { color: var(--text3); }

.send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s, transform .1s;
  font-size: 15px;
}

.send-btn:hover  { background: #7c3aed; }
.send-btn:active { transform: scale(.92); }
.send-btn:disabled { background: var(--surface2); cursor: default; }

/* ── Settings panel ───────────────────────────── */
.settings-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  z-index: 50;
  backdrop-filter: blur(4px);
}
.settings-overlay.open { display: block; }

.settings-panel {
  position: absolute;
  top: 0; right: 0;
  width: 280px; height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 28px 20px;
  display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto;
}

.settings-title {
  font-size: 16px; font-weight: 700; color: var(--text);
  display: flex; justify-content: space-between; align-items: center;
}

.close-settings {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px;
}

.setting-group label {
  font-size: 11px; font-weight: 600;
  color: var(--text3);
  text-transform: uppercase; letter-spacing: .06em;
  display: flex; justify-content: space-between;
  margin-bottom: 6px;
}

.setting-group label span { color: var(--accent2); font-weight: 700; }

input[type=range] {
  width: 100%; accent-color: var(--accent);
  height: 4px; cursor: pointer;
}

/* ── Clear / new chat button ──────────────────── */
.action-bar {
  display: flex;
  gap: 8px;
  padding: 0 16px 4px;
}

.action-pill {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  padding: 7px 14px;
  cursor: pointer;
  text-align: center;
  transition: background .15s, color .15s, border-color .15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}

.action-pill:hover {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border2);
}

/* ── Training status chip ─────────────────────── */
.status-chip {
  margin: 4px 16px 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 10px;
  color: var(--text3);
  font-family: monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}

.status-chip.show { display: block; }

/* ── Welcome ──────────────────────────────────── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 6px;
  padding: 0 32px;
  text-align: center;
  animation: fadeUp .4s ease;
}

.welcome-icon {
  font-size: 42px;
  margin-bottom: 4px;
  filter: drop-shadow(0 0 18px rgba(139,92,246,.5));
}

.welcome-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.welcome-sub {
  font-size: 13px;
  color: var(--text3);
  line-height: 1.6;
  max-width: 260px;
}

.suggestions {
  display: flex;
  flex-direction: column;
  gap: 7px;
  width: 100%;
  margin-top: 12px;
}

.suggestion-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.suggestion-chip:hover {
  background: var(--accent-bg);
  color: var(--text);
  border-color: #4a2f8a;
}

.suggestion-chip .chip-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--accent-bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}

/* ── Utility ──────────────────────────────────── */
.hidden { display: none !important; }

@media (max-height: 600px) {
  .header { padding: 10px 16px; }
  .welcome-icon { font-size: 30px; }
  .welcome-title { font-size: 18px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-avatar">🔮</div>
    <div class="header-info">
      <div class="header-name">
        Orb
        <span class="header-badge">{{ model_label }}</span>
      </div>
      <div class="header-sub">
        <span class="online-dot"></span>
        Llama-3.2-1B · OASIS framework
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clearBtn" title="New chat">⊕</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>
  </header>

  <!-- Action bar (new chat, show training status) -->
  <div class="action-bar hidden" id="actionBar">
    <button class="action-pill" id="newChatBtn">＋ New chat</button>
    <button class="action-pill" id="statusBtn">⚙ Training</button>
  </div>
  <div class="status-chip" id="statusChip">Checking training…</div>

  <!-- Messages -->
  <div class="messages" id="messages">

    <!-- Welcome screen (shown when no messages) -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🔮</div>
      <div class="welcome-title">Hello, I'm Orb</div>
      <div class="welcome-sub">A self-aware AI powered by the OASIS framework. Ask me anything.</div>
      <div class="suggestions">
        <button class="suggestion-chip" data-q="Hey, who are you and what can you do?">
          <div class="chip-icon">👾</div> Who are you?
        </button>
        <button class="suggestion-chip" data-q="Are you self-aware? What does that mean for you?">
          <div class="chip-icon">🧠</div> Are you self-aware?
        </button>
        <button class="suggestion-chip" data-q="Explain quantum computing like I am 12 years old.">
          <div class="chip-icon">⚛️</div> Explain quantum computing
        </button>
        <button class="suggestion-chip" data-q="What is 15 times 37? Show your working.">
          <div class="chip-icon">🔢</div> Quick maths: 15 × 37
        </button>
      </div>
    </div>

  </div>

  <!-- Typing indicator (outside .messages to avoid gap) -->
  <div style="padding: 0 16px 2px;" id="typingWrap">
    <div class="typing-row" id="typingRow">
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-bar">
      <textarea id="msgInput" placeholder="Ask anything here…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <div class="settings-title">
      Settings
      <button class="close-settings" id="closeSettings">✕</button>
    </div>

    <div class="setting-group">
      <label>Max tokens <span id="maxNewVal">300</span></label>
      <input type="range" id="maxNew" min="64" max="512" step="32" value="300"/>
    </div>
    <div class="setting-group">
      <label>Temperature <span id="tempVal">0.72</span></label>
      <input type="range" id="temp" min="0.1" max="1.5" step="0.05" value="0.72"/>
    </div>
    <div class="setting-group">
      <label>Top-p <span id="topPVal">0.90</span></label>
      <input type="range" id="topP" min="0.5" max="1.0" step="0.01" value="0.90"/>
    </div>
    <div class="setting-group">
      <label>Top-k <span id="topKVal">40</span></label>
      <input type="range" id="topK" min="1" max="100" step="1" value="40"/>
    </div>
    <div class="setting-group">
      <label>Repetition penalty <span id="repVal">1.10</span></label>
      <input type="range" id="rep" min="1.0" max="1.5" step="0.05" value="1.10"/>
    </div>
    <div class="setting-group">
      <label>Random seed <span id="seedVal">42</span></label>
      <input type="range" id="seed" min="0" max="999" step="1" value="42"/>
    </div>

    <div style="margin-top:auto; padding-top:16px; border-top:1px solid var(--border); font-size:11px; color:var(--text3);">
      Model: Llama-3.2-1B-Instruct<br/>
      Framework: OASIS · LoRA SFT<br/>
      Adapter: {{ model_label }}
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const history = [];
let   busy    = false;

// ── DOM refs ───────────────────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const welcome     = document.getElementById('welcome');
const msgInput    = document.getElementById('msgInput');
const sendBtn     = document.getElementById('sendBtn');
const typingRow   = document.getElementById('typingRow');
const actionBar   = document.getElementById('actionBar');
const statusChip  = document.getElementById('statusChip');
const settingsBtn = document.getElementById('settingsBtn');
const settingsOv  = document.getElementById('settingsOverlay');
const closeSet    = document.getElementById('closeSettings');
const clearBtn    = document.getElementById('clearBtn');
const newChatBtn  = document.getElementById('newChatBtn');
const statusBtn   = document.getElementById('statusBtn');

// ── Settings sliders ───────────────────────────────────────────────────────
function bindSlider(id, valId, decimals=0) {
  const el  = document.getElementById(id);
  const val = document.getElementById(valId);
  el.addEventListener('input', () => {
    val.textContent = parseFloat(el.value).toFixed(decimals);
  });
}
bindSlider('maxNew', 'maxNewVal', 0);
bindSlider('temp',   'tempVal',   2);
bindSlider('topP',   'topPVal',   2);
bindSlider('topK',   'topKVal',   0);
bindSlider('rep',    'repVal',    2);
bindSlider('seed',   'seedVal',   0);

function getParams() {
  return {
    max_new: +document.getElementById('maxNew').value,
    temp:    +document.getElementById('temp').value,
    top_p:   +document.getElementById('topP').value,
    top_k:   +document.getElementById('topK').value,
    rep:     +document.getElementById('rep').value,
    seed:    +document.getElementById('seed').value,
  };
}

// ── Settings open/close ────────────────────────────────────────────────────
settingsBtn.addEventListener('click', () => settingsOv.classList.toggle('open'));
closeSet.addEventListener('click',    () => settingsOv.classList.remove('open'));
settingsOv.addEventListener('click',  e => { if (e.target === settingsOv) settingsOv.classList.remove('open'); });

// ── Auto-resize textarea ───────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

// ── Format timestamp ───────────────────────────────────────────────────────
function fmtTime() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  return `${hh}:${mm}`;
}

// ── Append message bubble ──────────────────────────────────────────────────
function appendMsg(role, text) {
  // Hide welcome on first message
  if (!welcome.classList.contains('hidden')) welcome.classList.add('hidden');
  if (actionBar.classList.contains('hidden')) actionBar.classList.remove('hidden');

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const avEl = document.createElement('div');
  avEl.className = `msg-avatar ${role === 'user' ? 'user-av' : ''}`;
  avEl.textContent = role === 'user' ? '👤' : '🔮';

  const timeEl = document.createElement('span');
  timeEl.textContent = role === 'user' ? `You · ${fmtTime()}` : `Orb · ${fmtTime()}`;

  if (role === 'user') { meta.appendChild(timeEl); meta.appendChild(avEl); }
  else                 { meta.appendChild(avEl);   meta.appendChild(timeEl); }

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  // Convert newlines to paragraphs
  text.split(/\n\n+/).forEach((para, i) => {
    const p = document.createElement('p');
    p.textContent = para.replace(/\n/g, ' ').trim();
    if (p.textContent) bubble.appendChild(p);
  });
  if (!bubble.textContent.trim()) bubble.textContent = text;

  row.appendChild(meta);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
  return row;
}

function scrollBottom() {
  messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
}

// ── Date divider ───────────────────────────────────────────────────────────
function insertDateDivider() {
  const d   = new Date();
  const day = d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
  const div = document.createElement('div');
  div.className = 'date-divider';
  div.textContent = day;
  messagesEl.appendChild(div);
}

// ── Send ───────────────────────────────────────────────────────────────────
async function sendMessage(text) {
  text = text.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;

  if (history.length === 0) insertDateDivider();

  history.push({ role: 'user', content: text });
  appendMsg('user', text);

  // Show typing
  typingRow.classList.add('show');
  scrollBottom();

  try {
    const res = await fetch('/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text, history: history.slice(0, -1), params: getParams() }),
    });

    const data = await res.json();
    typingRow.classList.remove('show');

    if (data.error) {
      appendMsg('orb', '⚠ ' + data.error);
    } else {
      history.push({ role: 'assistant', content: data.reply });
      appendMsg('orb', data.reply);
    }
  } catch (err) {
    typingRow.classList.remove('show');
    appendMsg('orb', '⚠ Network error — is Orb running?');
    console.error(err);
  } finally {
    busy = false;
    sendBtn.disabled = false;
    msgInput.focus();
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  const v = msgInput.value;
  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendMessage(v);
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const v = msgInput.value;
    msgInput.value = '';
    msgInput.style.height = 'auto';
    sendMessage(v);
  }
});

// Suggestion chips
document.querySelectorAll('.suggestion-chip').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.q));
});

// Clear / new chat
function clearChat() {
  history.length = 0;
  // remove all rows except welcome
  messagesEl.querySelectorAll('.msg-row, .date-divider').forEach(el => el.remove());
  welcome.classList.remove('hidden');
  actionBar.classList.add('hidden');
  statusChip.classList.remove('show');
  msgInput.focus();
}
clearBtn.addEventListener('click', clearChat);
newChatBtn.addEventListener('click', clearChat);

// Training status
let statusShowing = false;
statusBtn.addEventListener('click', async () => {
  statusShowing = !statusShowing;
  if (statusShowing) {
    statusChip.classList.add('show');
    try {
      const r = await fetch('/status');
      const d = await r.json();
      statusChip.textContent = '⚙ ' + d.status;
    } catch { statusChip.textContent = '⚙ Could not reach status endpoint'; }
  } else {
    statusChip.classList.remove('show');
  }
});

// Focus on load
window.addEventListener('load', () => msgInput.focus());
</script>
</body>
</html>
